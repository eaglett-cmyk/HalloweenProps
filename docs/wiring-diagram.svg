<svg viewBox="0 0 960 736" xmlns="http://www.w3.org/2000/svg" width="100%" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">Skull Oracle wiring diagram</title>
  <desc id="dsc">An Adafruit Feather ESP32-S3 at the center connects to a VCNL4010 proximity sensor and a PN532 NFC reader on the shared I2C bus, eye LEDs and two momentary buttons on GPIO pins, and a DP-EH400 thermal printer powered by a separate 5 to 9 volt supply whose ground is tied to the Feather's common ground.</desc>

  <!-- panel -->
  <rect x="8" y="8" width="944" height="720" rx="16" fill="#fbfcfd" stroke="#e2e8f0"/>

  <!-- title -->
  <text x="28" y="44" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Skull Oracle — Wiring Diagram</text>
  <text x="28" y="66" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">Adafruit Feather ESP32-S3 · two I²C devices · thermal printer on its own 5–9 V supply</text>

  <!-- legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">
    <line x1="28"  y1="98" x2="50"  y2="98" stroke="#dc2626" stroke-width="3"/><text x="56"  y="102">3.3 V</text>
    <line x1="150" y1="98" x2="172" y2="98" stroke="#b45309" stroke-width="3"/><text x="178" y="102">Printer 5–9 V</text>
    <line x1="320" y1="98" x2="342" y2="98" stroke="#1f2937" stroke-width="3"/><text x="348" y="102">Common GND</text>
    <line x1="470" y1="98" x2="492" y2="98" stroke="#2563eb" stroke-width="3"/><text x="498" y="102">I²C (SDA/SCL)</text>
    <line x1="625" y1="98" x2="647" y2="98" stroke="#0d9488" stroke-width="3"/><text x="653" y="102">GPIO I/O</text>
    <line x1="740" y1="98" x2="762" y2="98" stroke="#ea580c" stroke-width="3"/><text x="768" y="102">Printer serial</text>
  </g>
  <line x1="28" y1="112" x2="924" y2="112" stroke="#eef2f6" stroke-width="1"/>

  <!-- ===================== connectors (under boxes) ===================== -->
  <!-- USB 5V in -->
  <line x1="480" y1="184" x2="480" y2="298" stroke="#64748b" stroke-width="2.5"/>
  <!-- eyes / buttons (GPIO, teal) -->
  <line x1="250" y1="187" x2="388" y2="330" stroke="#0d9488" stroke-width="2.5"/>
  <line x1="230" y1="283" x2="388" y2="352" stroke="#0d9488" stroke-width="2.5"/>
  <line x1="240" y1="383" x2="388" y2="400" stroke="#0d9488" stroke-width="2.5"/>
  <!-- I2C devices (blue) -->
  <line x1="712" y1="190" x2="572" y2="326" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="720" y1="310" x2="572" y2="360" stroke="#2563eb" stroke-width="2.5"/>
  <!-- printer serial (orange) -->
  <line x1="566" y1="402" x2="636" y2="478" stroke="#ea580c" stroke-width="2.5"/>
  <!-- PSU power to printer (maroon) -->
  <line x1="530" y1="584" x2="636" y2="520" stroke="#b45309" stroke-width="3"/>

  <!-- ground bus + stubs -->
  <line x1="540" y1="418" x2="540" y2="684" stroke="#1f2937" stroke-width="2.5"/>
  <line x1="470" y1="648" x2="470" y2="684" stroke="#1f2937" stroke-width="2.5"/>
  <line x1="700" y1="556" x2="700" y2="684" stroke="#1f2937" stroke-width="2.5"/>
  <line x1="300" y1="684" x2="724" y2="684" stroke="#1f2937" stroke-width="3.5"/>
  <circle cx="540" cy="684" r="3.2" fill="#1f2937"/>
  <circle cx="470" cy="684" r="3.2" fill="#1f2937"/>
  <circle cx="700" cy="684" r="3.2" fill="#1f2937"/>

  <!-- ===================== boxes ===================== -->
  <!-- hub: Feather -->
  <rect x="388" y="298" width="184" height="120" rx="12" fill="#0f172a"/>
  <text x="480" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">FEATHER</text>
  <text x="480" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#cbd5e1">ESP32-S3</text>
  <text x="480" y="394" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#94a3b8">3.3 V logic</text>

  <!-- USB -->
  <rect x="410" y="132" width="140" height="52" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="163" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" fill="#0f172a">USB-C  5 V</text>

  <!-- eyes -->
  <rect x="60" y="150" width="190" height="74" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="155" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">EYES (LEDs)</text>
  <text x="155" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">GP10 · PWM glow</text>
  <text x="155" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">330 Ω → LED → GND</text>

  <!-- mouth button -->
  <rect x="50" y="250" width="180" height="66" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="140" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">MOUTH BUTTON</text>
  <text x="140" y="298" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">GP12 ⟷ GND · +10</text>

  <!-- outside button -->
  <rect x="60" y="350" width="180" height="66" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="150" y="378" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">OUTSIDE BUTTON</text>
  <text x="150" y="398" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">GP13 ⟷ GND · trigger</text>

  <!-- VCNL4010 -->
  <rect x="712" y="150" width="210" height="80" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="817" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">VCNL4010</text>
  <text x="817" y="197" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">IR proximity · I²C 0x13</text>
  <text x="817" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">VIN · GND · SDA · SCL</text>

  <!-- PN532 -->
  <rect x="720" y="262" width="210" height="104" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="825" y="288" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">PN532 NFC</text>
  <text x="825" y="307" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">I²C 0x24 · SW1 ON / SW2 OFF</text>
  <text x="825" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">IRQ → D6 · RST → D9</text>
  <text x="825" y="343" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">VCC · GND · SDA · SCL</text>

  <!-- printer -->
  <rect x="636" y="452" width="224" height="104" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="748" y="478" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">DP-EH400 PRINTER</text>
  <text x="748" y="497" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">TTL serial · 3.3 V logic</text>
  <text x="748" y="516" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">RX ← TX · DTR* ← D11</text>
  <text x="748" y="534" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">VH ← PSU · GND → bus</text>
  <text x="748" y="550" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9.5" fill="#94a3b8">*DTR optional (USE_DTR)</text>

  <!-- PSU -->
  <rect x="300" y="556" width="230" height="92" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="1.5"/>
  <text x="415" y="582" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a">PRINTER PSU</text>
  <text x="415" y="601" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">5–9 V · 2 A+ · SEPARATE</text>
  <text x="415" y="619" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">V+ → printer VH</text>
  <text x="415" y="636" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748b">V– → common GND</text>

  <!-- ===================== wire labels ===================== -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="11">
    <text x="490" y="246" fill="#64748b">5 V in</text>
    <text x="312" y="250" text-anchor="middle" fill="#0d9488">D10</text>
    <text x="300" y="312" text-anchor="middle" fill="#0d9488">D12</text>
    <text x="306" y="380" text-anchor="middle" fill="#0d9488">D13</text>
    <text x="648" y="300" text-anchor="middle" fill="#2563eb">shared I²C bus</text>
    <text x="612" y="430" text-anchor="middle" fill="#ea580c">serial</text>
    <text x="572" y="544" text-anchor="middle" fill="#b45309">5–9 V</text>
  </g>

  <!-- ground bus label -->
  <text x="512" y="703" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1f2937">COMMON GROUND</text>
  <text x="512" y="718" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#64748b">Feather · sensors · buttons · printer · PSU all tie here</text>
</svg>
